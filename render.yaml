services:
  - type: web
    name: happywecan-api
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    autoDeployTrigger: checksPass
    healthCheckPath: /healthz
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://angelo.happywecan.com
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: "True"
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: happywecan-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeployTrigger: checksPass
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.happywecan.com
