services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      CORS_ORIGINS: https://angelo.happywecan.com
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USE_TLS: "True"
    volumes:
      - ./static/uploads:/app/static/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.happywecan.com
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.happywecan.com
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docs/nginx-vm.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
