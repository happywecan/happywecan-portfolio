services:
  backend:
    image: asia-east1-docker.pkg.dev/focal-freedom-473403-f8/happywecan/happywecan-api:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      CORS_ORIGINS: https://angelo.happywecan.com
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USE_TLS: "True"
    volumes:
      - ./static/uploads:/app/static/uploads

  frontend:
    image: asia-east1-docker.pkg.dev/focal-freedom-473403-f8/happywecan/happywecan-frontend:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.happywecan.com
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docs/nginx-vm.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
