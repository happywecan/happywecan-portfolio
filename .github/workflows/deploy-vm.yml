name: Deploy VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

env:
  PROJECT_ID: focal-freedom-473403-f8
  REGION: asia-east1
  VM_NAME: happywecan-vm
  VM_ZONE: us-central1-a

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/193468143671/locations/global/workloadIdentityPools/github-actions/providers/happywecan-portfolio
          service_account: github-actions-deployer@focal-freedom-473403-f8.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-api:${GITHUB_SHA} \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-api:main \
            .
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-api:${GITHUB_SHA}
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-api:main

      - name: Build and push frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://api.happywecan.com \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-frontend:${GITHUB_SHA} \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-frontend:main \
            ./frontend
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-frontend:${GITHUB_SHA}
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/happywecan/happywecan-frontend:main

      - name: Copy deployment files to VM
        run: |
          gcloud compute scp docker-compose.vm-pull.yml \
            ${VM_NAME}:/tmp/docker-compose.vm-pull-${GITHUB_SHA}.yml \
            --zone=${VM_ZONE} \
            --tunnel-through-iap
          gcloud compute scp scripts/deploy-vm-pull.sh \
            ${VM_NAME}:/tmp/deploy-vm-pull-${GITHUB_SHA}.sh \
            --zone=${VM_ZONE} \
            --tunnel-through-iap
          gcloud compute scp docs/nginx-vm.conf \
            ${VM_NAME}:/tmp/nginx-vm-${GITHUB_SHA}.conf \
            --zone=${VM_ZONE} \
            --tunnel-through-iap
          gcloud compute ssh ${VM_NAME} \
            --zone=${VM_ZONE} \
            --tunnel-through-iap \
            --command="sudo cp /tmp/docker-compose.vm-pull-${GITHUB_SHA}.yml /home/Angelo/angelo20011016.github.io/docker-compose.vm-pull.yml && sudo cp /tmp/nginx-vm-${GITHUB_SHA}.conf /home/Angelo/angelo20011016.github.io/docs/nginx-vm.conf && sudo chown Angelo:Angelo /home/Angelo/angelo20011016.github.io/docker-compose.vm-pull.yml /home/Angelo/angelo20011016.github.io/docs/nginx-vm.conf"

      - name: Deploy on VM
        run: |
          gcloud compute ssh ${VM_NAME} \
            --zone=${VM_ZONE} \
            --tunnel-through-iap \
            --command="sudo env IMAGE_TAG=${GITHUB_SHA} bash /tmp/deploy-vm-pull-${GITHUB_SHA}.sh && sudo rm -f /tmp/docker-compose.vm-pull-${GITHUB_SHA}.yml /tmp/deploy-vm-pull-${GITHUB_SHA}.sh /tmp/nginx-vm-${GITHUB_SHA}.conf"

      - name: Verify API
        run: |
          gcloud compute ssh ${VM_NAME} \
            --zone=${VM_ZONE} \
            --tunnel-through-iap \
            --command="sudo sh -lc 'cd /home/Angelo/angelo20011016.github.io && for i in \$(seq 1 12); do docker compose -f docker-compose.vm-pull.yml exec -T nginx wget -qO- http://backend:8000/healthz && exit 0; sleep 5; done; exit 1'"
